<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保护环境 - 微博</title>
    <style>
        /* 基础页面样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            background-color: #f5f6f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 微博卡片容器 */
        .weibo-card {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 20px 20px 10px 20px;
            box-sizing: border-box;
        }

        /* 头部：头像与用户信息 */
        .weibo-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 2px 4px rgba(76, 175, 80, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 16px;
            font-weight: 600;
            color: #eb7350; /* 微博经典橙色 */
            text-decoration: none;
            margin-bottom: 4px;
        }

        .username:hover {
            text-decoration: underline;
        }

        .meta {
            font-size: 12px;
            color: #939393;
        }

        /* 微博正文 */
        .weibo-content {
            font-size: 15px;
            line-height: 1.7;
            color: #333333;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .hashtag {
            color: #eb7350;
            text-decoration: none;
            margin-right: 5px;
        }

        .hashtag:hover {
            text-decoration: underline;
        }

        /* 九宫格配图区域（这里展示三图） */
        .weibo-media {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }

        .media-img {
            flex: 1;
            aspect-ratio: 1 / 1;
            border-radius: 6px;
            background-color: #e2f0e6;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .media-img:hover {
            opacity: 0.9;
        }

        /* 底部操作栏：转发、评论、点赞 */
        .weibo-footer {
            display: flex;
            border-top: 1px solid #f2f2f5;
            padding-top: 10px;
            margin-top: 10px;
        }

        .action-btn {
            flex: 1;
            text-align: center;
            color: #939393;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }

        .action-btn:hover {
            background: #f9f9f9;
            color: #eb7350;
        }

        /* 响应式处理 */
        @media (max-width: 480px) {
            .weibo-media {
                flex-direction: column;
            }
            .media-img {
                aspect-ratio: 16 / 9;
            }
        }
    </style>
</head>
<body>

    <div class="weibo-card">
        <!-- 头部信息 -->
        <div class="weibo-header">
            <div class="avatar">绿</div>
            <div class="user-info">
                <a href="#" class="username">地球环保小卫士V</a>
                <span class="meta">刚刚 来自 绿色地球客户端</span>
            </div>
        </div>

        <!-- 微博正文 -->
        <div class="weibo-content">
            <a href="#" class="hashtag">#保护环境#</a> 
            <a href="#" class="hashtag">#热爱地球#</a> 
            <a href="#" class="hashtag">#给地球减负#</a><br><br>
            🌍 地球是我们唯一且共享的家园，它孕育了万物，也无私地包容着我们。<br><br>
            💡 每一次随手关灯，每一次拒绝使用一次性塑料袋，每一次选择公交或骑行低碳出行，都是在为我们共同的未来投票。不要让我们的眼泪，成为地球上的最后一滴水。💧<br><br>
            🌱 环保不是一句空话，而是藏在生活细节里的点滴行动。让我们从今天开始，从身边的小事做起，一起行动起来，用心守护这颗美丽的蓝色星球吧！<br><br>
            你今天做了什么环保小事呢？在评论区告诉我吧！👇💚
        </div>

        <!-- 微博配图 (使用Unsplash的自然风景图) -->
        <div class="weibo-media">
            <div class="media-img" style="background-image: url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=400&q=80');" title="清澈的森林湖泊"></div>
            <div class="media-img" style="background-image: url('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?auto=format&fit=crop&w=400&q=80');" title="手中捧着的地球模型"></div>
            <div class="media-img" style="background-image: url('https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&w=400&q=80');" title="生机勃勃的绿芽"></div>
        </div>

        <!-- 底部互动栏 -->
        <div class="weibo-footer">
            <div class="action-btn">
                <span>➦</span> 转发 1.2万
            </div>
            <div class="action-btn">
                <span>💬</span> 评论 3560
            </div>
            <div class="action-btn">
                <span>👍</span> 赞 8.5万
            </div>
        </div>
    </div>

</body>
</html>
